name: Deploy to App Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.DEPLOY_GAE_SA }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      CUSTOMER_ID: ${{ secrets.GOOGLE_CUSTOMER_ID }}
      DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
      REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      META_APP_ID: ${{ secrets.META_APP_ID }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_AD_ACCOUNT_ID2: ${{ secrets.META_AD_ACCOUNT_ID2 }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests (if available)
      run: |
        if npm run test --silent 2>/dev/null; then
          npm test
        else
          echo "No test script found, skipping tests"
        fi
      continue-on-error: false
      
    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.DEPLOY_GAE_SA }}
    
    - name: Generate app.yaml
      run: |
        cat app.yaml.template | envsubst > app.yaml
        
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      
    - name: Verify authentication
      run: gcloud auth list
      
    - name: Deploy to App Engine
      run: |
        gcloud app deploy app.yaml --quiet --promote
        
    - name: Get deployment URL
      run: |
        echo "Service deployed to: https://google-campaign-leads-service-dot-${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}.uc.r.appspot.com"
        
    - name: Health check
      run: |
        sleep 60
        HEALTH_URL="https://google-campaign-leads-service-dot-${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}.uc.r.appspot.com/health"
        echo "Checking health at: $HEALTH_URL"
        
        if curl -f "$HEALTH_URL"; then
          echo "Health check passed!"
        else
          echo "Health check failed"
          exit 1
        fi